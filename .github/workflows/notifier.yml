name: Hackathon Notifier

on:
  schedule:
    # Runs every 6 hours — adjust as needed (cron UTC)
    - cron: "0 */6 * * *"
  workflow_dispatch:  # also allows manual trigger from GitHub UI

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore processed IDs cache
        uses: actions/cache@v4
        with:
          path: processed_ids.json
          key: processed-ids-${{ github.run_id }}
          restore-keys: |
            processed-ids-

      - name: Restore Gmail token
        run: echo "${{ secrets.GMAIL_TOKEN_PICKLE }}" | base64 -d > token.pickle

      - name: Restore Gmail credentials
        run: echo "${{ secrets.GMAIL_CREDENTIALS }}" | base64 -d > credentials.json

      - name: Run notifier
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          GEMINI_API_KEY:  ${{ secrets.GEMINI_API_KEY }}
        run: python main.py