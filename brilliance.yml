name: Brilliance Feed

on:
  schedule:
    # Twice daily: 8:00 and 20:00 IST (2:30 and 14:30 UTC)
    - cron: "30 2,14 * * *"
  workflow_dispatch:

jobs:
  feed:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore seen cache
        uses: actions/cache@v4
        with:
          path: brilliance_seen.json
          key: brilliance-seen-${{ github.run_id }}
          restore-keys: 
            brilliance-seen-

      - name: Run brilliance feed
        env:
          BRILLIANCE_BOT_TOKEN: ${{ secrets.BRILLIANCE_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:     ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python brilliance.py