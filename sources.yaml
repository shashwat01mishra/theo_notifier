# Brilliance feed sources
# Add a feed: one entry under its type. That's it.
#
# type: rss      → any standard RSS/Atom feed
# type: hn       → Hacker News via Algolia API (special-cased in fetcher)

sources:
  - name: quanta
    type: rss
    url: https://www.quantamagazine.org/feed/

  - name: tao
    type: rss
    url: https://terrytao.wordpress.com/feed/

  - name: hackernews
    type: hn
    url: https://hn.algolia.com/api/v1/search?tags=front_page
    min_points: 100
    max_items: 10

